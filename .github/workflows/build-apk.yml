name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS_VERSION: 34.0.0
  ANDROID_NDK_VERSION: 25.1.8937393

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
        shell: bash

      - name: Set execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Clean previous builds
        run: |
          rm -rf app/build .gradle ~/.gradle/caches

      - name: Build all debug APKs
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Debug APK paths
        run: find app/build/outputs -name "*.apk" -type f

      - name: Upload all debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: game-engine-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: game-engine-apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: '*.apk'
          tag_name: build-${{ github.run_number }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
