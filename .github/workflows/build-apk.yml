name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS_VERSION: 34.0.0
  ANDROID_NDK_VERSION: 25.1.8937393

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
        shell: bash

      - name: Set execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Clean previous builds
        run: |
          rm -rf app/build .gradle ~/.gradle/caches

      - name: Build debug APK (arm64-v8a)
        run: |
          ./gradlew assembleDebug -Ptarget=arm64-v8a --no-daemon

      - name: Upload arm64-v8a debug APK
        uses: actions/upload-artifact@v4
        with:
          name: game-engine-apk-arm64-v8a
          path: app/build/outputs/apk/debug/*-arm64-v8a-debug.apk
          retention-days: 30

      - name: Clean for next ABI build
        run: |
          rm -rf app/build

      - name: Build debug APK (armeabi-v7a)
        run: |
          ./gradlew assembleDebug -Ptarget=armeabi-v7a --no-daemon

      - name: Upload armeabi-v7a debug APK
        uses: actions/upload-artifact@v4
        with:
          name: game-engine-apk-armeabi-v7a
          path: app/build/outputs/apk/debug/*-armeabi-v7a-debug.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: game-engine-apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: *.apk
          tag_name: build-${{ github.run_number }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
