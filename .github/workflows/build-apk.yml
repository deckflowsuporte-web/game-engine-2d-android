name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: 34
  ANDROID_NDK_VERSION: 25.1.8937393

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup Android NDK
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Set execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Verify APK exists
        run: ls -la app/build/outputs/apk/debug/ && echo "APK exists: $(test -f app/build/outputs/apk/debug/app-debug.apk && echo YES || echo NO)"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: game-engine-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
